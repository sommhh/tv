<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>アンテナ方向プロ</title>
<style>
body{
  margin:0;
  background:#0b0b0d;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont;
  text-align:center;
}
#angle{
  font-size:60px;
  margin-top:30px;
}
#dir{
  font-size:24px;
  opacity:0.7;
}
button{
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#1f1f25;
  color:#fff;
  font-size:16px;
}
.warn{color:#ff6b6b;}
.good{color:#4caf50;}
</style>
</head>
<body>

<h2>アンテナ方向プロ</h2>
<div id="angle">--°</div>
<div id="dir">測位中...</div>
<div id="gps"></div>

<button onclick="start()">開始</button>

<script>
let targetLat = 35.7101; // スカイツリー
let targetLon = 139.8107;

let lastHeading = null;

function toRad(deg){ return deg * Math.PI/180; }
function toDeg(rad){ return rad * 180/Math.PI; }

// 方位角計算（真北基準）
function calcAzimuth(lat1, lon1, lat2, lon2){
  let dLon = toRad(lon2 - lon1);
  lat1 = toRad(lat1);
  lat2 = toRad(lat2);

  let y = Math.sin(dLon) * Math.cos(lat2);
  let x = Math.cos(lat1)*Math.sin(lat2) -
          Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);

  let brng = toDeg(Math.atan2(y, x));
  return (brng + 360) % 360;
}

// 平均化
let history = [];
function smooth(val){
  history.push(val);
  if(history.length > 5) history.shift();
  return history.reduce((a,b)=>a+b)/history.length;
}

function start(){

  // GPS取得
  navigator.geolocation.watchPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;
    let acc = pos.coords.accuracy;

    document.getElementById("gps").innerHTML =
      `GPS精度: ${acc.toFixed(1)}m`;

    if(acc > 30){
      document.getElementById("gps").className="warn";
    }else{
      document.getElementById("gps").className="good";
    }

    window.targetAzimuth = calcAzimuth(lat, lon, targetLat, targetLon);

  }, err=>{
    alert("GPS取得失敗");
  },{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:10000
  });

  // コンパス（iPhone対応）
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(res=>{
      if(res==='granted'){
        window.addEventListener('deviceorientation', handler);
      }
    });
  } else {
    window.addEventListener('deviceorientationabsolute', handler);
  }
}

function handler(e){

  let heading;

  if(e.webkitCompassHeading){
    heading = e.webkitCompassHeading; // iPhone
  }else{
    heading = 360 - e.alpha; // Android
  }

  if(heading == null) return;

  // ノイズカット
  if(lastHeading !== null){
    if(Math.abs(heading - lastHeading) > 30) return;
  }
  lastHeading = heading;

  heading = smooth(heading);

  let diff = window.targetAzimuth - heading;
  if(diff < 0) diff += 360;

  document.getElementById("angle").innerText =
    diff.toFixed(1) + "°";

  let txt = "";

  if(diff < 5 || diff > 355){
    txt = "◎ 完全一致";
  }else if(diff < 15){
    txt = "○ かなり良い";
  }else if(diff < 30){
    txt = "△ 調整必要";
  }else{
    txt = "× 大きくズレ";
  }

  document.getElementById("dir").innerText = txt;
}

</script>
</body>
</html>
